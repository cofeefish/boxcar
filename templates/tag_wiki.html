<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> tag wiki </title>
    <link rel="stylesheet" type="text/css" href="/static/styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
    <header>
        <h1 class="left-padded">Boxcar</h1>
        <nav>
            <menu class="left-padded">
                <a href="/">Home</a>
                <a href="/queue">Upload Queue</a>
                <a href="/settings">Settings</a>
                <a href="/statistics">Statistics</a>
                <a href="/tag_wiki">Tag Wiki</a>
            </menu>
        </nav>
    </header>
    <main class="page-content">
        <h2>Search</h2>
        <div class="search-box">
            <form id="search-box-form" action="/tag_wiki" method="get" accept-charset="UTF-8">
                <span class="flex-row">
                    <input name="query" type="text" value="{{search}}">
                    <button type="submit" class="icon-button"> <i class="material-icons">search</i></button>
                </span>
            </form>
        </div>
        <h2>Tags</h2>
        <div class="">
            <ul>    
            {%for tag in tag_dict %}
                <li>
                    <a href="/tag_wiki/{{tag['name']}}">?</a>
                    <a class="tag-search-link" href="/?query={{tag['name']}}">{{tag['name']}}</a>
                    ({{tag['count']}})
                </li>
            {% endfor %}
            </ul>
        </div>
    </main>
</body>
</html>
